startCommand:
  type: stdio
  configSchema:
    properties:
      specRootDir:
        type: string
        description: "Root directory name for ai-spec folder (default: ai-spec)"
        default: "ai-spec"
    additionalProperties: false
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "spec-tools-mcp@latest"],
      env: {
        SPEC_ROOT_DIR: config.specRootDir ?? "ai-spec"
      }
    })
